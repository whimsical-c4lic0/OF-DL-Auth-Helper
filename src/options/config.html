<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>OF-DL Auth Helper Settings</title>
    <style>
        :root {
            --bg-gradient-start: #f8fbff;
            --bg-gradient-end: #f0f8f5;
            --panel-bg: #ffffff;
            --card-bg: #fafbfc;
            --border: #e1e8f0;
            --text: #1a2332;
            --text-muted: #64748b;
            --accent: #10b981;
            --accent-hover: #059669;
            --secondary: #3b82f6;
            --success-bg: #f0fdf4;
            --success-border: #bbf7d0;
            --success-text: #166534;
            --info-bg: #eff6ff;
            --info-border: #bfdbfe;
            --info-text: #1e40af;
            --error-bg: #fef2f2;
            --error-border: #fecaca;
            --error-text: #991b1b;
            --danger-bg: #fef2f2;
            --danger-border: #fecaca;
            --danger-text: #991b1b;
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 10px 24px rgba(0, 0, 0, 0.1);
            --radius-sm: 6px;
            --radius-md: 8px;
            --radius-lg: 12px;
            --radius-xl: 16px;
            --space-1: 0.25rem;
            --space-2: 0.5rem;
            --space-3: 0.75rem;
            --space-4: 1rem;
            --space-5: 1.5rem;
            --space-6: 2rem;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            min-height: 100%;
        }

        .hidden {
            display: none !important;
        }

        .muted {
            color: var(--text-muted);
        }

        .error {
            color: var(--error-text);
        }

        .info {
            color: var(--info-text);
        }

        .success {
            color: var(--success-text);
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: var(--space-6) var(--space-4);
            overflow-y: auto;
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            font-size: 14px;
            line-height: 1.6;
            background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
        }

        .config-shell {
            margin: auto;
            padding: var(--space-6);
            max-width: 720px;
            width: 100%;
            border-radius: var(--radius-xl);
            border: 1px solid var(--border);
            background: var(--panel-bg);
            box-shadow: var(--shadow-lg);
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: var(--space-4);
            padding-bottom: var(--space-5);
            border-bottom: 1px solid var(--border);
        }

        .header-brand {
            display: flex;
            align-items: center;
            gap: var(--space-3);
            min-width: 0;
        }

        .logo {
            width: 48px;
            height: 48px;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            background: linear-gradient(135deg, #f3f4f6 0%, #e5e7eb 100%);
            padding: 8px;
            flex-shrink: 0;
        }

        .title {
            margin: 0 0 var(--space-1);
            font-size: 24px;
            font-weight: 600;
            color: var(--text);
            letter-spacing: -0.01em;
        }

        .subtitle {
            margin: 0;
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 400;
        }

        .content {
            margin-top: var(--space-5);
            display: grid;
            gap: var(--space-4);
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: var(--space-5);
        }

        .card-title {
            margin: 0 0 var(--space-2);
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.02em;
            text-transform: uppercase;
            color: var(--text);
        }

        .card-body {
            margin: 0;
            color: var(--text-muted);
            font-size: 14px;
            line-height: 1.6;
        }

        .toggle-row {
            display: flex;
            align-items: center;
            gap: var(--space-3);
            margin: var(--space-4) 0 0;
        }

        #auto-version-check {
            appearance: none;
            width: 48px;
            height: 28px;
            border-radius: 999px;
            border: 2px solid #cbd5e1;
            background: #e2e8f0;
            position: relative;
            cursor: pointer;
            transition: all 200ms ease;
            flex-shrink: 0;
        }

        #auto-version-check::before {
            content: "";
            position: absolute;
            top: 2px;
            left: 2px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #ffffff;
            box-shadow: var(--shadow-sm);
            transition: transform 200ms ease;
        }

        #auto-version-check:checked {
            border-color: var(--accent);
            background: var(--accent);
        }

        #auto-version-check:checked::before {
            transform: translateX(20px);
        }

        #auto-version-check:focus-visible,
        #manual-version-check:focus-visible,
        #clear-extension-data:focus-visible,
        #latest-release-link:focus-visible {
            outline: 2px solid var(--secondary);
            outline-offset: 2px;
        }

        #auto-version-check[disabled] {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .toggle-text {
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
        }

        .manual-check-row {
            margin-top: var(--space-4);
            display: flex;
            align-items: center;
            gap: var(--space-3);
            flex-wrap: wrap;
        }

        #manual-version-check {
            margin: 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: var(--space-2);
            border: 1px solid var(--accent);
            border-radius: var(--radius-md);
            padding: var(--space-2) var(--space-4);
            font-size: 13px;
            font-weight: 600;
            color: #ffffff;
            background: var(--accent);
            box-shadow: var(--shadow-sm);
            cursor: pointer;
            transition: all 150ms ease;
        }

        #manual-version-check:hover:not([disabled]) {
            background: var(--accent-hover);
            border-color: var(--accent-hover);
            box-shadow: var(--shadow-md);
        }

        #manual-version-check[disabled] {
            opacity: 0.5;
            cursor: not-allowed;
        }

        #manual-version-check img {
            width: 16px;
            height: 16px;
        }

        #manual-check-status {
            margin: 0;
            font-size: 14px;
            font-weight: 600;
        }

        #version-check-summary {
            margin: var(--space-4) 0 0;
            padding: var(--space-4);
            border-radius: var(--radius-md);
            border: 1px solid var(--info-border);
            background: var(--info-bg);
            color: var(--info-text);
            font-size: 13px;
            line-height: 1.6;
        }

        #latest-release-container {
            margin-top: var(--space-4);
            padding: var(--space-4);
            border-radius: var(--radius-md);
            border: 1px solid var(--success-border);
            background: var(--success-bg);
        }

        #latest-release-message {
            color: var(--success-text);
            font-size: 14px;
            font-weight: 600;
        }

        #latest-release-link {
            display: inline-block;
            margin-top: var(--space-2);
            font-weight: 600;
            color: var(--success-text);
            text-decoration: underline;
            text-decoration-thickness: 2px;
            text-underline-offset: 2px;
        }

        #latest-release-link:hover {
            color: var(--accent-hover);
        }

        .danger-card {
            border-color: var(--danger-border);
            background: var(--danger-bg);
        }

        #clear-extension-data {
            margin-top: var(--space-4);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: var(--space-2);
            border: 1px solid var(--danger-border);
            border-radius: var(--radius-md);
            padding: var(--space-2) var(--space-4);
            font-size: 13px;
            font-weight: 600;
            color: var(--danger-text);
            background: #ffffff;
            cursor: pointer;
            transition: all 150ms ease;
        }

        #clear-extension-data:hover:not([disabled]) {
            background: var(--danger-bg);
            box-shadow: var(--shadow-sm);
        }

        #clear-extension-data[disabled] {
            opacity: 0.5;
            cursor: not-allowed;
        }

        #clear-extension-data img {
            width: 16px;
            height: 16px;
        }

        @media (max-width: 740px) {
            body {
                padding: var(--space-4) var(--space-3);
            }

            .config-shell {
                padding: var(--space-5);
            }

            .header {
                flex-direction: column;
                align-items: flex-start;
            }

            .manual-check-row {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <main class="config-shell">
        <header class="header">
            <div class="header-brand">
                <img class="logo" src="../icons/cookie.png" alt="">
                <div>
                    <h1 class="title">Extension Settings</h1>
                    <p class="subtitle">Manage automatic update checks and saved data</p>
                </div>
            </div>
        </header>

        <div class="content">
            <section class="card">
                <h2 class="card-title">Automatic Update Checks</h2>
                <p class="card-body">Check for new GitHub releases once per day.</p>
                <label class="toggle-row">
                    <input id="auto-version-check" type="checkbox">
                    <span class="toggle-text">Enable automatic update checks</span>
                </label>
                <div class="manual-check-row">
                    <button id="manual-version-check" type="button">
                        Check for updates now
                    </button>
                    <p id="manual-check-status" class="muted"></p>
                </div>

                <div id="latest-release-container" class="hidden">
                    <strong id="latest-release-message"></strong>
                    <br>
                    <a id="latest-release-link" target="_blank" rel="noopener noreferrer">Open release page</a>
                </div>
                <p id="version-check-summary"></p>
            </section>

            <section class="card danger-card">
                <h2 class="card-title">Reset Extension Data</h2>
                <p class="card-body">Clear all stored auth data and settings, then return to fresh-install state.</p>
                <button id="clear-extension-data" type="button">
                    <img src="../icons/ic-trash.svg" alt="">
                    Clear all extension data
                </button>
            </section>


        </div>
    </main>

    <script type="text/javascript" src="../lib/browser-polyfill.min.js"></script>
    <script type="text/javascript" src="config.js"></script>
</body>
</html>
